<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskMaster Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-logo">
                <h2>TaskMaster <span style="font-weight: 300;">PRO</span></h2>
            </div>
            <div class="nav-user-actions">
                <button id="themeToggle" class="theme-toggle" title="Toggle Dark/Light Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <span class="welcome-text">Welcome, <span id="userNameDisplay">User</span></span>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </nav>

        <!-- Task Controls -->
        <section class="controls-section">
            <div class="search-sort-group">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="filter-btn-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <select id="sortBy" style="width: auto;">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="alphabetical">A-Z</option>
                </select>
            </div>
            <button id="openAddTaskModal" class="add-task-btn">
                <i class="fas fa-plus"></i> New Task
            </button>
        </section>

        <!-- Task Grid -->
        <div id="taskGrid" class="task-grid">
            <!-- Empty State (Fallback) -->
            <div class="empty-state">
                <i class="fas fa-tasks"></i>
                <h3>No tasks found</h3>
                <p>Start organizing your day by adding a new task!</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Task</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description (Optional)</label>
                    <textarea id="taskDesc" rows="4" placeholder="Add more details..."></textarea>
                </div>
                <button type="submit" class="auth-btn">
                    <span id="saveBtnText">Add Task</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Dashboard JS -->
    <script src="js/dashboard.js"></script>
</body>
</html>
